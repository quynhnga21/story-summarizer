<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Story Summarizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-2xl">

    <h1 class="text-2xl font-bold mb-6 text-center">
        📚 Tóm tắt truyện tự động
    </h1>

    <form method="post" onsubmit="showLoading()">
        <input 
            type="text" 
            name="name" 
            placeholder="Nhập tên truyện (VD: Dế Mèn Phiêu Lưu Ký)"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none"
        >

        <button 
            type="submit"
            class="w-full mt-4 bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-semibold"
        >
            Tóm tắt
        </button>
    </form>

    <!-- Loading -->
    <div id="loading" class="hidden mt-4 text-center text-gray-400">
        ⏳ Đang xử lý...
    </div>

    <!-- Kết quả -->
    {% if result %}
    <div class="mt-6 p-4 bg-gray-700 rounded-lg">
        <h2 class="font-semibold mb-2">📖 Kết quả:</h2>
        <p class="text-gray-200">{{ result }}</p>
    </div>
    {% endif %}

</div>

<script>
function showLoading() {
    document.getElementById("loading").classList.remove("hidden");
}
</script>

</body>
</html>
